name: CI/CD Pipeline

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  REPO_OWNER: b022mc

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Run backend tests
        run: go test ./...

  frontend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint

      - name: Run frontend build
        run: npx next build

  build-backend:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [backend-quality, frontend-quality]
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - name: api
            target: blog-api
          - name: article
            target: article
          - name: user
            target: user
          - name: comment
            target: comment
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: ${{ matrix.service.target }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/blog-${{ matrix.service.name }}:latest
            ${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/blog-${{ matrix.service.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [backend-quality, frontend-quality]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/blog-frontend:latest
            ${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/blog-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Load manifests
        id: manifests
        run: |
          set -euo pipefail

          emit_manifest_group() {
            local output_name="$1"
            local dir="$2"
            local first=1
            local found=0

            {
              echo "${output_name}<<EOF"
              while IFS= read -r file; do
                found=1
                if [ "$first" -eq 0 ]; then
                  echo "---"
                fi
                cat "$file"
                echo
                first=0
              done < <(find "$dir" -maxdepth 1 -type f -name '*.yaml' ! -name 'kustomization.yaml' | sort)
              echo "EOF"
            } >> "$GITHUB_OUTPUT"

            if [ "$found" -eq 0 ]; then
              echo "No manifest files found in $dir" >&2
              exit 1
            fi
          }

          emit_manifest_group base backend/deploy/k8s/base
          emit_manifest_group middleware_core backend/deploy/k8s/middleware/core
          emit_manifest_group middleware_init backend/deploy/k8s/middleware/init
          emit_manifest_group backend_services backend/deploy/k8s/services/backend
          emit_manifest_group frontend_services backend/deploy/k8s/services/frontend

      - name: Deploy to K3s
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.K3S_HOST }}
          username: root
          password: ${{ secrets.K3S_PASSWORD }}
          script: |
            set -euo pipefail

            export OWNER="${{ env.REPO_OWNER }}"
            export SHA="${{ github.sha }}"
            export REGISTRY="${{ env.REGISTRY }}"

            k3s kubectl apply -f - <<'BASE'
            ${{ steps.manifests.outputs.base }}
            BASE

            k3s kubectl apply -f - <<'CORE'
            ${{ steps.manifests.outputs.middleware_core }}
            CORE

            k3s kubectl -n blog wait --for=condition=ready pod -l app=mysql --timeout=180s

            k3s kubectl apply -f - <<'INIT'
            ${{ steps.manifests.outputs.middleware_init }}
            INIT

            k3s kubectl -n blog wait --for=condition=complete job/mysql-init-schema --timeout=120s

            k3s kubectl apply -f - <<'BACKEND'
            ${{ steps.manifests.outputs.backend_services }}
            BACKEND

            k3s kubectl apply -f - <<'FRONTEND'
            ${{ steps.manifests.outputs.frontend_services }}
            FRONTEND

            k3s kubectl -n blog set image deployment/blog-api \
              blog-api=${REGISTRY}/${OWNER}/blog-api:${SHA}
            k3s kubectl -n blog set image deployment/article \
              article=${REGISTRY}/${OWNER}/blog-article:${SHA}
            k3s kubectl -n blog set image deployment/user \
              user=${REGISTRY}/${OWNER}/blog-user:${SHA}
            k3s kubectl -n blog set image deployment/comment \
              comment=${REGISTRY}/${OWNER}/blog-comment:${SHA}
            k3s kubectl -n blog set image deployment/frontend \
              frontend=${REGISTRY}/${OWNER}/blog-frontend:${SHA}

            k3s kubectl -n blog rollout status deployment/blog-api --timeout=120s
            k3s kubectl -n blog rollout status deployment/article --timeout=120s
            k3s kubectl -n blog rollout status deployment/user --timeout=120s
            k3s kubectl -n blog rollout status deployment/comment --timeout=120s
            k3s kubectl -n blog rollout status deployment/frontend --timeout=120s

            echo "Blog deployment complete."
