name: CI/CD Pipeline

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  REPO_OWNER: b022mc
  DEPLOY_ROLLOUT_TIMEOUT: 15m

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Run backend tests
        run: go test ./...

  frontend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend lint
        run: npm run lint

      - name: Run frontend tests
        run: npm run test

      - name: Run frontend build
        run: npm run build

  build-backend:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [backend-quality, frontend-quality]
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - name: api
            target: blog-api
          - name: article
            target: article
          - name: user
            target: user
          - name: comment
            target: comment
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push ${{ matrix.service.name }}
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: ${{ matrix.service.target }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/blog-${{ matrix.service.name }}:latest
            ${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/blog-${{ matrix.service.name }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [backend-quality, frontend-quality]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/blog-frontend:latest
            ${{ env.REGISTRY }}/${{ env.REPO_OWNER }}/blog-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Load manifests
        id: manifests
        run: |
          set -euo pipefail

          emit_manifest_group() {
            local output_name="$1"
            local dir="$2"
            local first=1
            local found=0

            {
              echo "${output_name}<<EOF"
              while IFS= read -r file; do
                found=1
                if [ "$first" -eq 0 ]; then
                  echo "---"
                fi
                cat "$file"
                echo
                first=0
              done < <(find "$dir" -maxdepth 1 -type f -name '*.yaml' ! -name 'kustomization.yaml' | sort)
              echo "EOF"
            } >> "$GITHUB_OUTPUT"

            if [ "$found" -eq 0 ]; then
              echo "No manifest files found in $dir" >&2
              exit 1
            fi
          }

          emit_manifest_group base backend/deploy/k8s/base
          emit_manifest_group middleware_core backend/deploy/k8s/middleware/core
          emit_manifest_group middleware_init backend/deploy/k8s/middleware/init
          emit_manifest_group backend_services backend/deploy/k8s/services/backend
          emit_manifest_group frontend_services backend/deploy/k8s/services/frontend

      - name: Deploy to K3s
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.K3S_HOST }}
          username: root
          password: ${{ secrets.K3S_PASSWORD }}
          command_timeout: 30m
          script: |
            set -euo pipefail

            export OWNER="${{ env.REPO_OWNER }}"
            export SHA="${{ github.sha }}"
            export REGISTRY="${{ env.REGISTRY }}"
            export ROLLOUT_TIMEOUT="${{ env.DEPLOY_ROLLOUT_TIMEOUT }}"
            export DIAG_DIR="/tmp/blog-deploy-diagnostics-${SHA}"
            export DIAG_ARCHIVE="/tmp/blog-deploy-diagnostics-${SHA}.tgz"

            rm -rf "${DIAG_DIR}" "${DIAG_ARCHIVE}"
            mkdir -p "${DIAG_DIR}"

            finalize_diagnostics() {
              tar -czf "${DIAG_ARCHIVE}" -C /tmp "blog-deploy-diagnostics-${SHA}" >/dev/null 2>&1 || true
              echo "Deployment diagnostics archive: ${DIAG_ARCHIVE}"
            }

            trap finalize_diagnostics EXIT

            rollout_with_diagnostics() {
              local deployment="$1"
              local timeout="$2"
              local pods

              echo "Waiting for deployment/${deployment} rollout for up to ${timeout}..."
              if k3s kubectl -n blog rollout status "deployment/${deployment}" --timeout="${timeout}"; then
                return 0
              fi

              echo "Rollout failed for deployment/${deployment}, collecting diagnostics..."
              k3s kubectl -n blog get deployment "${deployment}" -o wide \
                >"${DIAG_DIR}/${deployment}-deployment.txt" 2>&1 || true
              cat "${DIAG_DIR}/${deployment}-deployment.txt"
              k3s kubectl -n blog describe deployment "${deployment}" \
                >"${DIAG_DIR}/${deployment}-describe.txt" 2>&1 || true
              cat "${DIAG_DIR}/${deployment}-describe.txt"
              k3s kubectl -n blog get pods -l "app=${deployment}" -o wide \
                >"${DIAG_DIR}/${deployment}-pods.txt" 2>&1 || true
              cat "${DIAG_DIR}/${deployment}-pods.txt"

              pods="$(k3s kubectl -n blog get pods -l "app=${deployment}" -o name || true)"
              if [ -z "${pods}" ]; then
                return 1
              fi

              while IFS= read -r pod; do
                local pod_name
                local pod_file_prefix

                [ -n "${pod}" ] || continue
                pod_name="${pod#pod/}"
                pod_file_prefix="${DIAG_DIR}/${deployment}-${pod_name}"

                k3s kubectl -n blog describe "${pod}" \
                  >"${pod_file_prefix}-describe.txt" 2>&1 || true
                cat "${pod_file_prefix}-describe.txt"
                k3s kubectl -n blog logs "${pod_name}" --all-containers=true --tail=200 \
                  >"${pod_file_prefix}-logs.txt" 2>&1 || true
                cat "${pod_file_prefix}-logs.txt"
              done <<< "${pods}"

              return 1
            }

            smoke_check() {
              local url="$1"
              local label="$2"

              echo "Running smoke check for ${label}: ${url}"
              curl -fsS --max-time 10 "${url}" >"${DIAG_DIR}/${label}.health.json"
              cat "${DIAG_DIR}/${label}.health.json"
            }

            k3s kubectl apply -f - <<'BASE'
            ${{ steps.manifests.outputs.base }}
            BASE

            k3s kubectl apply -f - <<'MIDDLEWARE_CORE'
            ${{ steps.manifests.outputs.middleware_core }}
            MIDDLEWARE_CORE

            k3s kubectl -n blog delete job mysql-init-schema --ignore-not-found
            k3s kubectl apply -f - <<'MIDDLEWARE_INIT'
            ${{ steps.manifests.outputs.middleware_init }}
            MIDDLEWARE_INIT
            k3s kubectl -n blog wait --for=condition=complete job/mysql-init-schema --timeout=5m

            k3s kubectl apply -f - <<'BACKEND'
            ${{ steps.manifests.outputs.backend_services }}
            BACKEND

            k3s kubectl apply -f - <<'FRONTEND'
            ${{ steps.manifests.outputs.frontend_services }}
            FRONTEND

            k3s kubectl -n blog set image deployment/blog-api \
              blog-api=${REGISTRY}/${OWNER}/blog-api:${SHA}
            k3s kubectl -n blog set image deployment/article \
              article=${REGISTRY}/${OWNER}/blog-article:${SHA}
            k3s kubectl -n blog set image deployment/user \
              user=${REGISTRY}/${OWNER}/blog-user:${SHA}
            k3s kubectl -n blog set image deployment/comment \
              comment=${REGISTRY}/${OWNER}/blog-comment:${SHA}
            k3s kubectl -n blog set image deployment/frontend \
              frontend=${REGISTRY}/${OWNER}/blog-frontend:${SHA}

            rollout_with_diagnostics blog-api "${ROLLOUT_TIMEOUT}"
            rollout_with_diagnostics article "${ROLLOUT_TIMEOUT}"
            rollout_with_diagnostics user "${ROLLOUT_TIMEOUT}"
            rollout_with_diagnostics comment "${ROLLOUT_TIMEOUT}"
            rollout_with_diagnostics frontend "${ROLLOUT_TIMEOUT}"

            smoke_check "http://127.0.0.1:30800/api/healthz" "blog-api"
            smoke_check "http://127.0.0.1:30180/healthz" "frontend"

            echo "Blog deployment complete."

      - name: Download deployment diagnostics
        if: always()
        continue-on-error: true
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.K3S_HOST }}
          username: root
          password: ${{ secrets.K3S_PASSWORD }}
          source: /tmp/blog-deploy-diagnostics-${{ github.sha }}.tgz
          target: deploy-diagnostics

      - name: Upload deployment diagnostics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-diagnostics-${{ github.sha }}
          path: deploy-diagnostics/**/*.tgz
          if-no-files-found: warn

      - name: Write deployment summary
        if: always()
        run: |
          {
            echo "## Deployment Handoff"
            echo "- Image SHA: \`${{ github.sha }}\`"
            echo "- Smoke checks: \`http://127.0.0.1:30800/api/healthz\`, \`http://127.0.0.1:30180/healthz\`"
            echo "- Diagnostics artifact: \`deploy-diagnostics-${{ github.sha }}\`"
            echo "- Rollback guide: \`docs/blog-operations-runbook.md\`"
          } >> "$GITHUB_STEP_SUMMARY"
