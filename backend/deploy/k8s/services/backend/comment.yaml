apiVersion: apps/v1
kind: Deployment
metadata:
  name: comment
  namespace: blog
  labels:
    app: comment
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: comment
  template:
    metadata:
      labels:
        app: comment
    spec:
      containers:
        - name: comment
          image: ghcr.io/b022mc/blog-comment:latest
          ports:
            - containerPort: 9003
          volumeMounts:
            - name: config
              mountPath: /app/configs/config.yaml
              subPath: config.yaml
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          readinessProbe:
            tcpSocket:
              port: 9003
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: comment-config
---
apiVersion: v1
kind: Service
metadata:
  name: comment
  namespace: blog
spec:
  selector:
    app: comment
  ports:
    - port: 9003
      targetPort: 9003
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: comment-config
  namespace: blog
data:
  config.yaml: |
    server:
      grpc:
        addr: 0.0.0.0:9003
    data:
      database:
        source: root:blogB022.@tcp(mysql.blog.svc.cluster.local:3306)/blog?charset=utf8mb4&parseTime=true&loc=Asia%2FShanghai
