apiVersion: apps/v1
kind: Deployment
metadata:
  name: blog-api
  namespace: blog
  labels:
    app: blog-api
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: blog-api
  template:
    metadata:
      labels:
        app: blog-api
    spec:
      containers:
        - name: blog-api
          image: ghcr.io/b022mc/blog-api:latest
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: config
              mountPath: /app/configs/config.yaml
              subPath: config.yaml
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: blog-api-config
---
apiVersion: v1
kind: Service
metadata:
  name: blog-api
  namespace: blog
spec:
  type: NodePort
  selector:
    app: blog-api
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30800
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: blog-api-config
  namespace: blog
data:
  config.yaml: |
    server:
      http:
        addr: 0.0.0.0:8080
    services:
      article:
        addr: article.blog.svc.cluster.local:9001
      user:
        addr: user.blog.svc.cluster.local:9002
      comment:
        addr: comment.blog.svc.cluster.local:9003
    auth:
      secret: blog-jwt-secret-key-2026
