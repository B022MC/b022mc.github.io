syntax = "proto3";

package blog.v1;

option go_package = "github.com/b022mc/b022mc.github.io/backend/api/blog/v1;v1";

import "google/protobuf/timestamp.proto";
import "blog/v1/article.proto";

service CommentService {
  rpc CreateComment(CreateCommentRequest) returns (CommentReply);
  rpc DeleteComment(DeleteCommentRequest) returns (EmptyReply);
  rpc ListComments(ListCommentsRequest) returns (ListCommentsReply);
}

message Comment {
  int64 id = 1;
  int64 article_id = 2;
  int64 parent_id = 3;
  int64 user_id = 4;
  string username = 5;
  string content = 6;
  google.protobuf.Timestamp created_at = 7;
  repeated Comment children = 8;
}

message CreateCommentRequest {
  int64 article_id = 1;
  int64 parent_id = 2;
  int64 user_id = 3;
  string content = 4;
}

message DeleteCommentRequest {
  int64 id = 1;
}

message ListCommentsRequest {
  int64 article_id = 1;
}

message CommentReply {
  Comment comment = 1;
}

message ListCommentsReply {
  repeated Comment comments = 1;
}
